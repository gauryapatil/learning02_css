<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 150px;
            height: 150px;
            border-radius: 20px;
            background: yellow;
            position: relative;
            animation: movigbox;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-delay: 2s;
            animation-direction: alternate;
         }
         @keyframes movingbox
         {
            0%{background-color: red;left:0px ;top: 0px}
            25%{background-color: blue;left:300px ;top: 0px}
            50%{background-color: green;left:300px ;top: 300px}
            75%{background-color: burlywood;left:0px ;top: 300px}
            100%{background-color: red;left:0px ;top: 0px}
         }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
