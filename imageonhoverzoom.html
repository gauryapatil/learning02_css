<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img-wrapper{
            width: 100px;
            height: 100px;
            border: 5px solid red;
            position: relative;
            overflow: hidden;
        }
        .inner-img{
            width: 100px;
            height: 100px;
            transition: 4s;
            object-fit: cover;
        }
        .inner-img:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="img-wrapper">
    <img class="inner-img" src="/image/wallpaper.webp" alt="wallpaper"
</div>
</body>
</html>
