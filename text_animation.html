<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .text-container{
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            letter-spacing: 6px;
            font-size: 90px;
            font-weight: 800;
        }
        .text-container > b {
            height: 300px;
            box-shadow: 10px 20px 10px gray;
            background: linear-gradient(to right, red,orange,yellow,black);
            background-clip: text;
            color: transparent;
            transform-origin: bottom;
            transform: rotateX(85deg);
            animation:getupdown 10s infinite ;

        }
        
        .text-container>b:nth-child(1){
            animation-delay: 0.0s;
        }
        .text-container>b:nth-child(2){
            animation-delay: 0.50s;
        }
        .text-container>b:nth-child(3){
            animation-delay: 0.75s;
        }
        .text-container>b:nth-child(4){
            animation-delay: 0.100s;
        }
        .text-container>b:nth-child(5){
            animation-delay: 0.125s;
        }
        .text-container>b:nth-child(6){
            animation-delay: 0.175s;
        }
        
    </style>
</head>
<body>
    <div class="text-container">
        <b>G</b><b>A</b><b>U</b><b>R</b><b>A</b><b>V</b>
    </div>
</body>
</html>
